name: ci
on:
  push:
    branches: [master, 1.x]
  pull_request:

env:
  FEATURES: cookies,psl

jobs:
  test:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    env:
      RUST_BACKTRACE: 1
      RUST_LOG: isahc=debug
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y libkrb5-dev
        if: matrix.os == 'ubuntu-latest'

      - name: Update Cargo.lock
        run: cargo update

      - name: Cache Cargo dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Check Clippy lints
        run: cargo clippy --features ${{ env.FEATURES }},unstable-interceptors

      - name: Run tests
        run: cargo test --features ${{ env.FEATURES }},spnego,unstable-interceptors

      - name: Run example program
        run: cargo run --release --example simple
